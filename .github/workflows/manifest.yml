name: Generate release manifest

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # needed to commit manifest.json back to the repo

jobs:
  manifest:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate manifest.json
        shell: pwsh
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE }}
        run: |
          $ErrorActionPreference = 'Stop'

          $commitSha = (git rev-parse HEAD).Trim()
          Write-Host "Commit SHA: $commitSha"

          $zipUrl  = "https://github.com/${{ github.repository }}/archive/$commitSha.zip"
          $zipPath = Join-Path $env:TEMP 'release.zip'
          Write-Host "Downloading ZIP: $zipUrl"
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath -UseBasicParsing
          $zipHash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLower()
          Write-Host "ZIP SHA-256: $zipHash"
          Remove-Item $zipPath -Force

          $manifest = [ordered]@{
            schema_version = 1
            repository     = '${{ github.repository }}'
            branch         = 'main'
            commit_sha     = $commitSha
            zip_url        = $zipUrl
            zip_sha256     = $zipHash
            generated_at   = (Get-Date -Format 'o')
          }
          $manifestJson = $manifest | ConvertTo-Json -Depth 3
          $manifestJson | Set-Content -Path 'manifest.json' -Encoding UTF8

          if (-not $env:GPG_PRIVATE_KEY) {
            Write-Warning 'GPG_PRIVATE_KEY secret not set - skipping signature.'
            'pending' | Set-Content -Path 'manifest.sig' -Encoding UTF8
            exit 0
          }

          # Import the private key into the runner's GPG keyring
          $env:GPG_PRIVATE_KEY | gpg --batch --import
          if ($LASTEXITCODE -ne 0) { throw "GPG key import failed" }

          # Sign the manifest - output detached ASCII signature
          echo $env:GPG_PASSPHRASE | gpg --batch --yes --passphrase-fd 0 `
              --armor --detach-sign manifest.json
          if ($LASTEXITCODE -ne 0) { throw "GPG signing failed" }

          # gpg --detach-sign creates manifest.json.asc - rename to manifest.sig
          Move-Item manifest.json.asc manifest.sig -Force
          Write-Host "Manifest signed with GPG."

      - name: Commit manifest back to repo
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if the manifest actually changed
          if git diff --quiet manifest.json manifest.sig; then
            echo "Manifest unchanged - nothing to commit."
          else
            git add manifest.json manifest.sig
            git commit -m "chore: update manifest for $(git rev-parse --short HEAD~1)"
            git push
          fi
